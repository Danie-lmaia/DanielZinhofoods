<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - DanielzinhoFoods</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 8px; margin: 5px 0; display: block; width: 250px; }
        button { padding: 10px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>🚀 Painel de Controle Admin</h2>

    <div class="box">
        <h3>1. Novo Restaurante</h3>
        <input type="text" id="resNome" placeholder="Nome do Restaurante">
        <input type="text" id="resCat" placeholder="Categoria (ex: Pizza)">
        <input type="number" id="resTaxa" placeholder="Taxa de Entrega R$">
        <button onclick="apiPost('/api/admin/cadastrar-restaurante', {nome: resNome.value, categoria: resCat.value, taxa: resTaxa.value})">Salvar Restaurante</button>
    </div>

    <div class="box">
        <h3>2. Adicionar Prato ao Menu</h3>
        <input type="text" id="menuRes" placeholder="Nome exato do Restaurante">
        <input type="text" id="menuNome" placeholder="Nome do Prato">
        <input type="number" id="menuPreco" placeholder="Preço R$">
        <button onclick="apiPost('/api/admin/adicionar-item', {restaurante: menuRes.value, nome: menuNome.value, preco: menuPreco.value})">Adicionar ao Menu</button>
    </div>

    <div class="box">
        <h3>3. Criar Cupom de Desconto</h3>
        <input type="text" id="cupomCod" placeholder="Ex: PROMO10">
        <input type="number" id="cupomValor" placeholder="Valor do Desconto R$">
        <button onclick="apiPost('/api/admin/cadastrar-cupom', {codigo: cupomCod.value, valor: cupomValor.value})">Ativar Cupom</button>
    </div>

    <button onclick="location.href='home.html'" style="background: #555;">Voltar ao Site</button>

    <script>
        async function apiPost(rota, dados) {
            await fetch("http://127.0.0.1:5001" + rota, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            alert("Operação realizada!");
        }
    </script>
</body>
</html>
